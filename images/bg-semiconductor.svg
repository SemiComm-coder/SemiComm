<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04111f" />
      <stop offset="100%" stop-color="#081a2d" />
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#5fe3c8" stop-opacity="0.24" />
      <stop offset="100%" stop-color="#05111f" stop-opacity="0" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#base)" />
