    <path d="M0 680h1600" />
    <path d="M0 610h1600" />
    <path d="M0 540h1600" />
    <path d="M0 470h1600" />
  </g>

  <g stroke="#ffffff" stroke-opacity="0.12" stroke-width="2" fill="none">
