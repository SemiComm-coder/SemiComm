    <path d="M900 260h320M1060 260v260" stroke="#55d3a4" stroke-width="2.5" stroke-linecap="round" />
    <path d="M1240 420h180M1320 420v160" stroke="#88d4ff" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <g opacity="0.1">
    <circle cx="180" cy="150" r="14" fill="#7ef0d6" filter="url(#glow)" />
    <circle cx="520" cy="130" r="12" fill="#94c8ff" filter="url(#glow)" />
    <circle cx="1180" cy="100" r="14" fill="#7be0ff" filter="url(#glow)" />
    <circle cx="760" cy="440" r="10" fill="#6cd6c4" filter="url(#glow)" />
