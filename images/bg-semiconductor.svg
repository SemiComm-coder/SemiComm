<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#091622" />
      <stop offset="80%" stop-color="#04101c" />
      <stop offset="100%" stop-color="#02070f" />
    </radialGradient>
    <radialGradient id="wafer-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#59d2c7" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#050e16" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="wafer-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2333" />
      <stop offset="100%" stop-color="#0a1a29" />
    </linearGradient>
    <pattern id="wafer-die" width="80" height="80" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
      <rect width="80" height="80" fill="rgba(255,255,255,0.02)" />
      <path d="M0 0 L80 0 M0 20 L80 20 M0 40 L80 40 M0 60 L80 60 M20 0 L20 80 M40 0 L40 80 M60 0 L60 80" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    </pattern>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />

  <circle cx="800" cy="430" r="380" fill="url(#wafer-ring)" opacity="0.95" />
  <circle cx="800" cy="430" r="340" fill="url(#wafer-glow)" filter="url(#softGlow)" />

  <g opacity="0.22" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2">
    <circle cx="800" cy="430" r="280" />
    <circle cx="800" cy="430" r="230" />
    <circle cx="800" cy="430" r="180" />
    <circle cx="800" cy="430" r="135" />
    <circle cx="800" cy="430" r="90" />
    <circle cx="800" cy="430" r="45" />
  </g>

  <circle cx="800" cy="430" r="286" fill="url(#wafer-die)" />

  <g fill="none" stroke="rgba(90,214,167,0.24)" stroke-width="2">
    <path d="M435 395 L640 395" />
    <path d="M950 395 L1165 395" />
    <path d="M600 290 L840 290" />
    <path d="M600 530 L840 530" />
    <path d="M700 230 L700 625" />
    <path d="M900 230 L900 625" />
  </g>

  <g fill="none" stroke="rgba(144,233,255,0.18)" stroke-width="1.4">
    <path d="M680 210 L760 210" />
    <path d="M750 210 L810 290" />
    <path d="M810 290 L890 290" />
    <path d="M620 520 L700 520" />
    <path d="M700 520 L760 600" />
  </g>

  <g fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="1">
    <path d="M800 150 L840 180" />
    <path d="M760 170 L820 230" />
    <path d="M860 590 L900 640" />
    <path d="M940 540 L980 560" />
    <path d="M675 640 L720 670" />
  </g>

  <g fill="rgba(94,214,166,0.22)">
    <circle cx="745" cy="360" r="10" />
    <circle cx="870" cy="470" r="10" />
    <circle cx="780" cy="520" r="8" />
    <circle cx="910" cy="320" r="8" />
  </g>

  <rect x="180" y="120" width="240" height="180" rx="28" fill="rgba(255,255,255,0.02)" />
  <rect x="1180" y="620" width="220" height="140" rx="18" fill="rgba(255,255,255,0.02)" />
  <rect x="130" y="700" width="340" height="120" rx="48" fill="rgba(255,255,255,0.015)" />

  <g fill="rgba(255,255,255,0.08)">
    <circle cx="235" cy="175" r="12" />
    <circle cx="1510" cy="780" r="14" />
    <circle cx="360" cy="760" r="10" />
  </g>
</svg>
